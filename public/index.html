<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Gemini</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="chat-panel" aria-label="Chat com Gemini">
            <div class="hero">
                <p class="eyebrow">Gemini + Node.js</p>
                <h1>ChatBot</h1>
            </div>

            <form class="chat-form" id="chatForm">
                <label class="sr-only" for="messageInput">Digite sua pergunta</label>
                <textarea
                    id="messageInput"
                    name="message"
                    placeholder="O que você quer saber?"
                    rows="1"
                    required
                ></textarea>
                <button type="submit" id="sendButton" aria-label="Enviar pergunta">
                    <span>Enviar</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 12L20 4L16 20L12.5 13.5L4 12Z"></path>
                    </svg>
                </button>
            </form>

            <div class="messages" id="messages" aria-live="polite"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
